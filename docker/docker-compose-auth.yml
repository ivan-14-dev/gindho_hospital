name: gindho-auth

services:
  postgres:
    image: postgres:16-alpine
    container_name: gindho-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gindho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gindho}
      POSTGRES_DB: ${POSTGRES_DB:-gindho}
    ports:
      - "${POSTGRES_PORT:-95432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gindho"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gindho-redis
    ports:
      - "${REDIS_PORT:-96379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: gindho-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-92181}:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gindho-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-99092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  keycloak-db:
    image: postgres:16-alpine
    container_name: gindho-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: gindho-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-9001}:8080"
    volumes:
      - ../infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  setup-service:
    build:
      context: ../services/setup-service
      dockerfile: Dockerfile
    container_name: gindho-setup-service
    ports: ["9002:9002"]
    environment:
      - SERVER_PORT=9002
      - DB_USERNAME=${DB_USERNAME:-gindho}
      - DB_PASSWORD=${DB_PASSWORD:-gindho}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }

  identity-service:
    build:
      context: ../services/identity-service
      dockerfile: Dockerfile
    container_name: gindho-identity-service
    ports: ["8111:9001"]
    environment:
      - PORT=9001
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/identity_service
      - DB_USERNAME=${DB_USERNAME:-gindho}
      - DB_PASSWORD=${DB_PASSWORD:-gindho}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET:-test-secret}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_CLIENT_ID=gindho-client
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-test-secret}
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
      keycloak: { condition: service_healthy }
    profiles: [services]

  authorization-service:
    build:
      context: ../services/authorization-service
      dockerfile: Dockerfile
    container_name: gindho-authorization-service
    ports: ["9003:9012"]
    environment:
      - PORT=9012
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/authorization_service
      - DB_USERNAME=${DB_USERNAME:-gindho}
      - DB_PASSWORD=${DB_PASSWORD:-gindho}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET:-test-secret}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
      redis: { condition: service_healthy }
    profiles: [services]

volumes:
  postgres-data:
  redis-data:
  keycloak-db-data: