      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JWT_SECRET=${JWT_SECRET:-mySecretKeyForJWTTokenGeneration1234567890}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
