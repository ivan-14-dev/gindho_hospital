      - SERVER_PORT=8080
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JWT_SECRET=${JWT_SECRET:-mySecretKeyForJWTTokenGeneration1234567890}
    depends_on:
      kafka: { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health || exit 1"]
