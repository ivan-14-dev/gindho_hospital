      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JWT_SECRET=${JWT_SECRET:-mySecretKeyForJWTTokenGeneration1234567890}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9012/actuator/health || exit 1"]
