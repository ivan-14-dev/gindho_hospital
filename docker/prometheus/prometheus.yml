global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: spring-boot-apps
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - patient-service:8081
          - appointment-service:8082
          - billing-service:8084
