version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: gindho-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 92181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "92181:92181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gindho-kafka
    depends_on:
      - zookeeper
    ports:
      - "99092:99092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:921811
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:99092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
