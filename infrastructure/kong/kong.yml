# ============================================================================
# GinDHO Kong API Gateway Configuration
# ============================================================================
# Strangler Fig migration: monolith endpoints are gradually replaced by
# microservices.
#
# LOCAL DEV (Docker Compose): http://localhost:8000/api/v1/* → microservices
# PRODUCTION (Kubernetes):    https://api.gindho.com/api/v1/* → microservices
# ============================================================================
_format_version: "3.0"

# --- Global plugins ---
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000    # React dev
        - http://localhost:5173    # Vite dev
        - http://localhost:8000    # Kong / JavaFX
        - https://*.gindho.com
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Accept, Authorization, Content-Type, X-CSRF-Token]
      exposed_headers: [Authorization]
      credentials: true
  - name: rate-limiting
    config:
      minute: 60
      hour: 1000
      policy: local
  - name: prometheus

# ===========================================================================
# UPSTREAM SERVICES (point to the correct host depending on environment)
# ===========================================================================
# Docker Compose: use service names directly (e.g. http://patient-service:8081)
# Kubernetes: use the cluster DNS names (e.g. http://patient-service.patient.svc.cluster.local:8081)

services:
  # ================================================================
  # 1️⃣ IDENTITY & AUTHORIZATION
  # ================================================================
  - name: identity-service
    url: http://identity-service:8081
    routes:
      - name: identity-auth-route
        paths:
          - /api/auth
        methods: [GET, POST, PUT, PATCH, DELETE]
        strip_path: false
      - name: identity-users-route
        paths:
          - /api/users
        methods: [GET, POST, PUT, PATCH, DELETE]
        strip_path: false
    plugins:
      - name: rate-limiting
        config: { minute: 30, hour: 300 }
      - name: cors
      - name: prometheus

  - name: authorization-service
    url: http://authorization-service:8080
    routes:
      - name: authorization-main-route
        paths:
          - /api/authorization
          - /api/authorize
          - /api/admin
        methods: [GET, POST, PUT, PATCH, DELETE]
        strip_path: false
    plugins:
      - name: jwt
      - name: cors
      - name: prometheus

