# GinDHO — Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'patient-service:8081'
          - 'appointment-service:8082'
          - 'medical-record-service:8083'
          - 'billing-service:8084'
          - 'identity-service:8085'
          - 'authorization-service:8086'
          - 'notification-service:8087'
          - 'reporting-service:8088'
          - 'inventory-service:8089'
          - 'pharmacy-service:8090'
          - 'laboratory-service:8091'
          - 'emergency-service:8092'

rule_files:
  - 'alerts.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']