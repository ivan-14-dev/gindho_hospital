apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: appointment-service
  namespace: argocd
spec:
  project: gindho-services
  source:
    repoURL: https://github.com/gindho/gindho
    targetRevision: HEAD
    path: k8s/helm/appointment
  destination:
    server: https://kubernetes.default.svc
    namespace: appointment
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
