apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: billing-service-ingress
  namespace: billing
  annotations:
    kubernetes.io/ingress.class: kong
spec:
  rules:
  - host: api.gindho.com
    http:
      paths:
      - path: /billing
        pathType: Prefix
        backend:
          service:
            name: billing-service
            port:
              number: 8094
