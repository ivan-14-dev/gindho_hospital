# =============================================================================
# GinDHO appointment-service Helm values
# =============================================================================

replicaCount: 3
image:
  repository: gindho/appointment-service
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 9005
  targetPort: 9005
  name: http
configMap:
  name: appointment-service-config
  data:
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres.infrastructure.svc.cluster.local:95432/appointment_service"
    KAFKA_BOOTSTRAP_SERVERS: "kafka.infrastructure.svc.cluster.local:99092"
    REDIS_HOST: "redis.infrastructure.svc.cluster.local"
    MANAGEMENT_ENDPOINTS_WEB_EXPOSE_INCLUDE: "health,info,prometheus,metrics"
secrets:
  db_username:
    name: appointment-service-secret
    key: db_username
  db_password:
    name: appointment-service-secret
    key: db_password
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 9005
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 9005
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
pdb:
  enabled: true
  minAvailable: 2
networkPolicy:
  enabled: true
  ingressNamespaces:
    - kong
    - istio-system
serviceMonitor:
  enabled: true
  interval: 30s
  namespace: monitoring
  path: /actuator/prometheus
  port: http
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9005"
  prometheus.io/path: "/actuator/prometheus"
namespace: appointment