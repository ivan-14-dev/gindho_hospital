apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: infrastructure
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: postgres-backup
              image: gindho/backup-tool:latest
              env:
                - name: POSTGRES_HOST
                  value: "postgres.infrastructure.svc.cluster.local"
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: username
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: password
                - name: BACKUP_S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backup-secret
                      key: s3_bucket
                - name: BACKUP_S3_REGION
                  valueFrom:
                    secretKeyRef:
                      name: backup-secret
                      key: s3_region
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          restartPolicy: OnFailure
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongodb-backup
  namespace: infrastructure
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: mongodb-backup
              image: gindho/backup-tool:latest
              env:
                - name: MONGO_HOST
                  value: "mongodb.infrastructure.svc.cluster.local"
                - name: MONGO_USER
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-secret
                      key: mongodb_root_username
                - name: MONGO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-secret
                      key: mongodb_root_password
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
          restartPolicy: OnFailure
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-secret
  namespace: infrastructure
type: Opaque
stringData:
  s3_bucket: "gindho-backups-prod"
  s3_region: "us-east-1"
  aws_access_key: "REPLACE_WITH_AWS_KEY"
  aws_secret_key: "REPLACE_WITH_AWS_SECRET"