apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: infrastructure
  labels:
    app: jaeger
    component: tracing
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.53
        env:
        - name: LOG_LEVEL
          value: "info"
        ports:
        - containerPort: 16685
          name: collector
        - containerPort: 16686
          name: query
        - containerPort: 14250
          name: collector-grpc
        - containerPort: 14268
          name: collector-http
        - containerPort: 9411
          name: zipkin
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        - containerPort: 3200
          name: tempo
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: infrastructure
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
  - port: 16685
    targetPort: 16685
    name: collector
  - port: 16686
    targetPort: 16686
    name: query
  - port: 14250
    targetPort: 14250
    name: collector-grpc
  - port: 14268
    targetPort: 14268
    name: collector-http
  - port: 9411
    targetPort: 9411
    name: zipkin
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    name: otlp-http
  - port: 3200
    targetPort: 16686
    name: tempo
  selector:
    app: jaeger
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: infrastructure
data:
  jaeger.yaml: |
    service:
      name: jaeger
    sampler:
      type: probabilistic
      param: 1
    reporter:
      log_spans: true