apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: infrastructure
  labels:
    app: kafka
    component: streaming
spec:
  serviceName: "kafka"
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: bitnami/kafka:3.5
        ports:
        - containerPort: 9092
          name: client
        - containerPort: 9093
          name: controller
        env:
        - name: KAFKA_CFG_PROCESS_ROLS
          value: "broker,controller"
        - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTING_ENABLED
          value: "true"
        - name: KAFKA_CFG_CONTROLLER_LISTENERS
          value: "CONTROLLER://:9093"
        - name: KAFKA_CFG_CONTROLLER_RAFOS
          value: "PLAINTEXT://kafka-0.kafka.infrastructure.svc.cluster.local:9093,kafka-1.kafka.infrastructure.svc.cluster.local:9093,kafka-2.kafka.infrastructure.svc.cluster.local:9093"
        - name: KAFKA_CFG_LISTENERS
          value: "CLIENT://:9092,CONTROLLER://:9093"
        - name: KAFKA_CFG_ADVERTISED_LISTENERS
          value: "CLIENT://kafka.infrastructure.svc.cluster.local:9092"
        - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CLIENT:PLAINTEXT,CONTROLLER:PLAINTEXT"
        - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
          value: "CLIENT"
        - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        - name: KAFKA_CFG_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "3"
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx512m -Xms256m"
        resources:
          requests:
            memory: "768Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - kafka-topics.sh
            - --bootstrap-server
            - localhost:9092
            - --list
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - kafka-topics.sh
            - --bootstrap-server
            - localhost:9092
            - --list
          initialDelaySeconds: 30
          periodSeconds: 10
      - name: kafka-ui
        image: provectuslabs/kafka-ui:latest
        ports:
        - containerPort: 8080
          name: ui
        env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: "gindho-kafka"
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
  volumeClaimTemplates:
  - metadata:
      name: kafka-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "kafka-storage"
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: infrastructure
  labels:
    app: kafka
spec:
  ports:
  - port: 9092
    targetPort: 9092
    name: client
  clusterIP: None
  selector:
    app: kafka