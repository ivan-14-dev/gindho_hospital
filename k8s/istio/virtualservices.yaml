---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: emr-api
  namespace: emr
spec:
  hosts:
  - api.gindho.com
  gateways:
  - istio-system/istio-ingressgateway
  http:
  - match:
    - uri:
        prefix: /emr
    route:
    - destination:
        host: emr-service.emr.svc.cluster.local
