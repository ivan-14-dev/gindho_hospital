apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: patient-api
  namespace: patient
spec:
  hosts:
  - api.gindho.com
  gateways:
  - istio-system/istio-ingressgateway
  http:
  - match:
    - uri:
        prefix: /patient
    route:
    - destination:
        host: patient-service.patient.svc.cluster.local
        port:
          number: 8081
        subset: v1
    retries:
      attempts: 3
      perTryTimeout: 2s
    timeout: 10s
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
