---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: gindho-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "api.gindho.com"
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      serverCertificate: /etc/istio/gateway-certs/tls.crt
      privateKey: /etc/istio/gateway-certs/tls.key
    hosts:
    - "api.gindho.com"