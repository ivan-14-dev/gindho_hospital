apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: patient
  labels:
    app: patient-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
        version: v1
    spec:
      serviceAccountName: patient-service-sa
      containers:
        - name: patient-service
          image: gindho/patient-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.infrastructure.svc.cluster.local:5432/patient_service"
            - name: SPRING_DATASOURCE_USERNAME
              value: "gindho"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "gindho123"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.infrastructure.svc.cluster.local:9092"
            - name: JWT_SECRET
              value: "gindho-development-secret-key-123456789"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: patient
  labels:
    app: patient-service
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: patient-service