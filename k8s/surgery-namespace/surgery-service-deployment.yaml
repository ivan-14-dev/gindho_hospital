apiVersion: apps/v1
kind: Deployment
metadata:
  name: surgery-service
  namespace: surgery
  labels:
    app: surgery-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: surgery-service
  template:
    metadata:
      labels:
        app: surgery-service
    spec:
      containers:
      - name: surgery-service
        image: gindho/surgery-service:latest
        ports:
        - containerPort: 9012
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: surgery-service-config
              key: database_url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: surgery-service-secret
              key: db_username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: surgery-service-secret
              key: db_password
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: surgery-service-config
              key: kafka_servers
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: surgery-service-secret
              key: jwt_secret
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 9012
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 9012
          initialDelaySeconds: 20
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: surgery-service
  namespace: surgery
spec:
  selector:
    app: surgery-service
  ports:
  - port: 9012
    targetPort: 9012
    name: http
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: surgery-service-config
  namespace: surgery
data:
  database_url: "jdbc:postgresql://postgres.surgery.svc.cluster.local:5432/surgery_service"
  kafka_servers: "kafka.infrastructure-namespace.svc.cluster.local:9092"
---
apiVersion: v1
kind: Secret
metadata:
  name: surgery-service-secret
  namespace: surgery
type: Opaque
data:
  db_username: Z2luZGhv
  db_password: Z2luZGhvMTIz
  jwt_secret: NDA0RTYzNTI2NjU1NkE1ODZFMzI3MjM1NzUzODc4MkY0MTNGNDQyODQ3MkI0QjYyNTA2NDUzNjc1NjZCNTk3MA==
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: surgery-service-hpa
  namespace: surgery
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: surgery-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
