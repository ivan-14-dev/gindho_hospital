## ============================================================================
## GinDHO Backend Configuration
## WARNING: No secrets in this file. All sensitive values come from env vars.
## ============================================================================

server.port=9001

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:95432/gindho}
spring.datasource.username=${DB_USERNAME:gindho}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration — Use Flyway exclusively; ddl-auto=validate prevents schema drift
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration (exclusive schema management)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration (migration to Keycloak OIDC in progress — see ADR-0002)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Storage
file.upload-dir=${FILE_UPLOAD_DIR:uploads}
file.max-size=${FILE_MAX_SIZE:10MB}

# Logging — DEBUG security disabled (was a prod risk); use only INFO in prod
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.gindho=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:WARN}
logging.file.name=${LOG_FILE:logs/gindho.log}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %clr(%-5level) - %msg%n

# Security — Default credentials MUST be overridden in production
spring.security.user.name=${SECURITY_DEFAULT_USERNAME:admin}
spring.security.user.password=${SECURITY_DEFAULT_PASSWORD}

# Async Configuration
spring.task.execution.pool.size=${ASYNC_POOL_SIZE:10}
spring.task.execution.pool.max-size=${ASYNC_POOL_MAX_SIZE:20}
spring.task.execution.thread-name-prefix=gindho-async-
