server:
  port: ${SERVER_PORT:-9001}

spring:
  application:
    name: identity-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/identity_service}
    username: ${DB_USERNAME:-gindho}
    password: ${DB_PASSWORD:-gindho123}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGeneration1234567890}
  issuer: https://gindho-keycloak.apps.gindho.com/realms/gindho
  audience: gindho-patient,gindho-billing,gindho-appointments

keycloak:
  realm: gindho
  url: ${KEYCLOAK_URL:http://localhost:8080}
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:${keycloak.url}}
  client-id: ${KEYCLOAK_CLIENT_ID:gindho-frontend}
  resource: ${KEYCLOAK_RESOURCE:${keycloak.client-id}}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:test-secret}
  ssl-required: external

security:
  web:
    cors:
      allowed-origins: "http://localhost:9300,http://localhost:5173,http://localhost:9041,http://localhost:8000,https://*.gindho.com"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.gindho: INFO
  file:
    name: /var/log/gindho/identity-service.log
