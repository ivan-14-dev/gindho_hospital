server:
  port: 9250

spring:
  application:
    name: interconnect-service
  datasource:
    url: jdbc:postgresql://localhost:5432/gindho_interconnect
    username: ${DB_USERNAME:gindho}
    password: ${DB_PASSWORD:gindho123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: interconnect-event:com.gindho.interconnect.event.InterconnectEvent

logging:
  level:
    com.gindho: INFO
    org.springframework.security: WARN
    org.springframework.web.reactive.function.client: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

app:
  interconnect:
    heartbeat-timeout-seconds: 300
    max-failed-heartbeats: 5
    encryption-enabled: false
    trust-store-path: ${TRUST_STORE_PATH:/etc/interconnect/truststore.jks}
    enable-remote-calls: true