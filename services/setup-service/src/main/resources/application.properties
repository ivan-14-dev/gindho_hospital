server.port=9002
spring.application.name=setup-service

# Database
spring.datasource.url=jdbc:postgresql://localhost:95432/setup_service
spring.datasource.username=${DB_USERNAME:-gindho}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:-localhost:99092}

# Security (temporairement desactive pour le setup)
spring.security.enabled=false

# Logging
logging.level.com.gindho.setup=DEBUG
logging.level.org.springframework=INFO