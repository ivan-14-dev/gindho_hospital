apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authorization-service-ingress
  namespace: authorization
  annotations:
    kubernetes.io/ingress.class: kong
spec:
  rules:
  - host: api.gindho.com
    http:
      paths:
      - path: /authorization
        pathType: Prefix
        backend:
          service:
            name: authorization-service
            port:
              number: 9030
