                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      port:
                        type: integer
                      protocol:
                        type: string
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                volumeMounts:
                  type: array
                  items:
                    type: object
                volumes:
                  type: array
                  items:
                    type: object
                serviceAccount:
                  type: string
            status:
              type: object
              properties:
                version:
                  type: string
                replicas:
                  type: integer
                status:
                  type: string
