apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "patient-service.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "patient-service.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.configMap.data }}
  {{ $key }}: "{{ $value }}"
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "patient-service.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "patient-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.db_username }}
  db_username: "{{ .Values.secrets.db_username.key }}"
  {{- end }}
  {{- if .Values.secrets.db_password }}
  db_password: "REPLACE_WITH_ACTUAL_PASSWORD"
  {{- end }}
  {{- if .Values.secrets.jwt_secret }}
  jwt_secret: "REPLACE_WITH_ACTUAL_JWT_SECRET"
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "patient-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "patient-service.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "patient-service.fullname" . }}-role
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "patient-service.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "watch", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "patient-service.fullname" . }}-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "patient-service.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "patient-service.fullname" . }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: {{ include "patient-service.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io