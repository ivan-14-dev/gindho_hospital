# Number of replicas
replicaCount: 3

# ConfigMap for non-sensitive config
configMap:
  name: patient-service-config
  data:
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres.infrastructure.svc.cluster.local:95432/patient_service"
    KAFKA_BOOTSTRAP_SERVERS: "kafka.infrastructure.svc.cluster.local:99092"
    MANAGEMENT_ENDPOINTS_WEB_EXPOSE_INCLUDE: "health,info,prometheus,metrics"
    SERVER_SHUTDOWN: "graceful"

# Secrets references (names/keys only; actual values come from real secrets)
secrets:
  db_username:
    name: patient-service-secret
    key: db_username
  db_password:
    name: patient-service-secret
    key: db_password
  jwt_secret:
    name: patient-service-secret
    key: jwt_secret

# NetworkPolicy values
networkPolicy:
  enabled: true
  ingressNamespaces:
    - kong
    - istio-system
  egressNamespaces:
    - infrastructure

# PodDisruptionBudget
pdb:
  enabled: true
  minAvailable: 2

# HorizontalPodAutoscaler
hpa:
  apiVersion: autoscaling/v2
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60

# VerticalPodAutoscaler
vpa:
  enabled: true
  memory:
    min: "256Mi"
    max: "2Gi"
  cpu:
    min: "100m"
    max: "1"

# ServiceMonitor for Prometheus operator
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /actuator/prometheus

# Service port configuration
service:
  port: 9004
  targetPort: 9004
  name: http

# Istio sidecar
istio:
  enabled: true

# Image
image:
  repository: gindho/patient-service
  tag: latest
  pullPolicy: IfNotPresent

# Health probes
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 9004
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 9004
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

# Resource requests/limits
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Namespace
namespace: patient