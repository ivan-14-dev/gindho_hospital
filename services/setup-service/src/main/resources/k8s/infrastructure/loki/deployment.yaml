apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: infrastructure
  labels:
    app: loki
    component: logging
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.9
        args:
        - -config.file=/etc/loki/local-config.yaml
        - -target=all
        ports:
        - containerPort: 9310
          name: http
        - containerPort: 9095
          name: grpc
        volumeMounts:
        - name: loki-config
          mountPath: /etc/loki
        - name: loki-storage
          mountPath: /loki
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /ready
            port: 9310
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 9310
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: loki-config
        configMap:
          name: loki-config
      - name: loki-storage
        persistentVolumeClaim:
          claimName: loki-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: infrastructure
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
  - port: 9310
    targetPort: 9310
    name: http
  - port: 9095
    targetPort: 9095
    name: grpc
  selector:
    app: loki
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: infrastructure
data:
  local-config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 9310
      grpc_listen_port: 9095
    common:
      path_prefix: /loki
      replication_factor: 3
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: filesystem
        schema: v12
        index:
          prefix: index_
          period: 24h
    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
        cache_ttl: 1h
        shared_store: s3
      filesystem:
        directory: /loki/chunks
    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      compaction_retention_enabled: true
      compaction_window: 24h