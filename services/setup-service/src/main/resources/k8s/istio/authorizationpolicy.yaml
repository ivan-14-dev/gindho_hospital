apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: infrastructure-authorization
  namespace: infrastructure
spec:
  selector:
    matchLabels:
      component: database
  rules:
  - from:
    - source:
        namespaces: ["patient", "appointment", "emr", "laboratory", "pharmacy", "billing", "inventory", "hr", "reporting"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
        paths: ["/api/*"]