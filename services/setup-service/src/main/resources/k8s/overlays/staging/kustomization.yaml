apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../infrastructure
  - ../../istio
  - ../../monitoring
  - ../../argocd
configMapGenerator:
  - name: environment-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=INFO
      - SPRING_PROFILES_ACTIVE=staging
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/resources/requests/memory
        value: "256Mi"
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/resources/requests/cpu
        value: "200m"
    target:
      kind: Deployment
secretGenerator:
  - name: tls-certificates
    files:
      - tls.crt=certs/staging.crt
      - tls.key=certs/staging.key